name: Python CI

on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          pip install uv
          make install
      - name: Run test coverage
        run: |
          make test-coverage
        env:
          SECRET_KEY: test-secret-key
          DEBUG: 'False'
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=gitfilin_python-project-52
            -Dsonar.organization=gitfilin
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.coverage.exclusions=**/tests.py,**/migrations/**,**/fixtures/**
            -Dsonar.exclusions=**/__pycache__/**,**/migrations/**,**/fixtures/**,**/.venv/**,**/staticfiles/**
