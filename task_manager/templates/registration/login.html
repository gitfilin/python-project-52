{% extends "base.html" %}
{% load i18n %}

{% block content %}
    <div class="col-md-6">
        <h1 class="text-start">{% trans "Вход" %}</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}<span class="form-text">{{ field.help_text }}</span>{% endif %}
                    {% if field.errors %}<div class="invalid-feedback d-block">{{ field.errors|join:", " }}</div>{% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">{% trans "Войти" %}</button>
        </form>
    </div>
{% endblock %}
