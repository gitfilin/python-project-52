{% extends "base.html" %}
{% load i18n %}

{% block content %}
    <h1>{% trans "Изменение задачи" %}</h1>
    <div style="max-width: 800px;">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group {% if field.errors %}field-invalid{% elif form.is_bound %}field-valid{% endif %}">
                    <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}<span class="form-text">{{ field.help_text }}</span>{% endif %}
                    {% if field.errors %}<div class="invalid-feedback">{{ field.errors|join:", " }}</div>{% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">{% trans "Изменить" %}</button>
        </form>
    </div>
{% endblock %}
