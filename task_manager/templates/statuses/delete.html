{% extends "base.html" %}
{% load i18n %}

{% block content %}
    <h1 class="h3 mb-4">{% trans "Удаление статуса" %}</h1>
    <div class="row">
        <div class="col-md-6">
            <form method="post">
                {% csrf_token %}
                <p class="mb-3">
                    {% blocktrans with name=object.name %}
                        Вы уверены, что хотите удалить "{{ name }}"?
                    {% endblocktrans %}
                </p>
                <button type="submit" class="btn btn-danger">{% trans "Да, удалить" %}</button>
                <a href="{% url 'statuses_list' %}" class="btn btn-outline-secondary">{% trans "Отмена" %}</a>
            </form>
        </div>
    </div>
{% endblock %}
